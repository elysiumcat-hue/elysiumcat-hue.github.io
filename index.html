<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDY DESK — 학습 자료실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Gothic+Coding:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     색상 토큰 — 기존 자료 디자인에 맞추려면 여기 값만 바꾸세요
     (한국 시장 관례: 상승=빨강 / 하락=파랑)
     ========================================================= */
  :root {
    --bg:        #f4f2ee;
    --bg-soft:   #ece9e3;
    --panel:     #ffffff;
    --panel-hi:  #fbfaf8;
    --border:    #e0dcd4;
    --border-hi: #c9c3b8;
    --text:      #1d2330;
    --text-dim:  #5e6678;
    --text-mute: #9aa0ad;
    --up:        #d32f2a;   /* 상승 (빨강) */
    --down:      #1f5fd6;   /* 하락 (파랑) */
    --accent:    #d32f2a;
    --glow:      rgba(211,47,42,0.14);
    --mono: 'Nanum Gothic Coding', monospace;
    --sans: 'Nanum Gothic', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 12% -5%, rgba(211,47,42,0.045), transparent 42%),
      radial-gradient(circle at 88% 8%, rgba(31,95,214,0.045), transparent 42%);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* 미세한 그리드 텍스처 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 28px;
  }

  /* ===================== HEADER ===================== */
  header {
    padding: 56px 0 30px;
    border-bottom: 1px solid var(--border-hi);
  }

  .ticker-bar {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-mute);
    text-transform: uppercase;
    display: flex;
    gap: 18px;
    align-items: center;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .ticker-bar .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--up);
    box-shadow: 0 0 8px var(--glow);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.35; } }

  h1 {
    font-family: var(--mono);
    font-size: clamp(34px, 6vw, 58px);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.02;
    margin-bottom: 14px;
  }
  h1 .bracket { color: var(--accent); }

  .subtitle {
    color: var(--text-dim);
    font-size: 15px;
    max-width: 540px;
    font-weight: 400;
  }

  /* ===================== TOOLBAR ===================== */
  .toolbar {
    margin: 34px 0 8px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search {
    position: relative;
    flex: 1;
    min-width: 220px;
  }
  .search input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px 12px 40px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .search input::placeholder { color: var(--text-mute); }
  .search input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }
  .search svg {
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    stroke: var(--text-mute);
  }
  .stat {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .stat b { color: var(--accent); font-weight: 600; }

  /* ===================== CATEGORY ===================== */
  .category { margin-top: 46px; }
  .cat-head {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .cat-head h2 {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .cat-head .id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .cat-head .count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ===================== CARDS ===================== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    position: relative;
    display: block;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 22px 20px;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(29,35,48,0.04);
    transition: transform 0.18s ease, border-color 0.18s, box-shadow 0.18s, background 0.18s;
    opacity: 0;
    transform: translateY(14px);
    animation: rise 0.5s cubic-bezier(0.2,0.7,0.2,1) forwards;
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: top;
    transition: transform 0.22s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--border-hi);
    background: var(--panel-hi);
    box-shadow: 0 10px 28px rgba(29,35,48,0.10);
  }
  .card:hover::before { transform: scaleY(1); }

  .card .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 7px;
    margin-bottom: 14px;
  }
  .card h3 {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .card p {
    font-size: 13.5px;
    color: var(--text-dim);
    font-weight: 400;
    line-height: 1.55;
    min-height: 42px;
  }
  .card .path {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mute);
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card .path .arrow {
    margin-left: auto;
    transition: transform 0.18s, color 0.18s;
  }
  .card:hover .path .arrow { transform: translateX(4px); color: var(--accent); }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-mute);
    font-family: var(--mono);
    font-size: 13px;
    padding: 40px 0;
  }

  /* ===================== FOOTER ===================== */
  footer {
    margin-top: 70px;
    padding: 28px 0 50px;
    border-top: 1px solid var(--border-hi);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mute);
    letter-spacing: 0.06em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  footer a { color: var(--text-dim); text-decoration: none; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="ticker-bar">
      <span class="dot"></span>
      <span>STUDY DESK</span>
      <span>·</span>
      <span id="clock">--:--:--</span>
      <span>·</span>
      <span>SESSION ACTIVE</span>
    </div>
    <h1><span class="bracket">[</span>학습 자료실<span class="bracket">]</span></h1>
    <p class="subtitle">주식·차트 분석을 중심으로 한 개인 학습 아카이브. 카테고리별로 정리된 자료를 모아 둡니다.</p>
  </header>

  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="search" placeholder="자료 검색 (제목·설명·태그)">
    </div>
    <div class="stat">TOTAL <b id="total">0</b> DOCS</div>
  </div>

  <main id="content"></main>

  <footer>
    <span>© <span id="year"></span> ELYSIUMCAT-HUE · STUDY DESK</span>
    <a href="https://github.com/elysiumcat-hue" target="_blank">GITHUB ↗</a>
  </footer>

</div>

<script>
/* =============================================================
   자료 목록 — 새 자료가 생기면 여기에만 추가하세요.
   카테고리 추가: categories 배열에 객체 하나 추가
   자료 추가:     해당 카테고리의 items 배열에 객체 하나 추가
   path 는 이 index.html 기준 상대경로입니다.
   ============================================================= */
const categories = [
  {
    id: "stock",
    title: "주식 · 차트 분석",
    items: [
      {
        title: "차트 분석 강좌",
        desc: "추세, 지지·저항, 거래량 등 차트 읽기의 기본기를 다지는 강좌.",
        path: "stock/chart-course.html",
        tag: "CHART"
      },
      {
        title: "캔들스틱 마스터",
        desc: "캔들 하나하나의 의미와 대표 패턴을 익히는 캔들스틱 집중 강좌.",
        path: "stock/candlestick-course.html",
        tag: "CANDLE"
      }
    ]
  }
  // 새 카테고리 예시 (주석 해제 후 사용):
  // ,{
  //   id: "pension",
  //   title: "연금 · 세금",
  //   items: [
  //     { title: "연금제도 정리", desc: "DB/DC/IRP 한눈에 보기.", path: "pension/index.html", tag: "PENSION" }
  //   ]
  // }
];

/* ---------- 렌더링 (이 아래는 건드릴 필요 없음) ---------- */
const content = document.getElementById('content');
const searchInput = document.getElementById('search');

const totalDocs = categories.reduce((n, c) => n + c.items.length, 0);
document.getElementById('total').textContent = totalDocs;
document.getElementById('year').textContent = new Date().getFullYear();

function render(filter = "") {
  const q = filter.trim().toLowerCase();
  content.innerHTML = "";
  let shown = 0, delay = 0;

  categories.forEach(cat => {
    const matched = cat.items.filter(it =>
      !q ||
      it.title.toLowerCase().includes(q) ||
      it.desc.toLowerCase().includes(q) ||
      (it.tag || "").toLowerCase().includes(q)
    );
    if (matched.length === 0) return;
    shown += matched.length;

    const section = document.createElement('section');
    section.className = 'category';
    section.innerHTML = `
      <div class="cat-head">
        <h2>${cat.title}</h2>
        <span class="id">${cat.id}/</span>
        <span class="count">${matched.length} item${matched.length > 1 ? 's' : ''}</span>
      </div>`;

    const grid = document.createElement('div');
    grid.className = 'grid';
    matched.forEach(it => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = it.path;
      a.style.animationDelay = (delay++ * 0.05) + 's';
      a.innerHTML = `
        <span class="tag">${it.tag || cat.id}</span>
        <h3>${it.title}</h3>
        <p>${it.desc}</p>
        <div class="path">${it.path}<span class="arrow">→</span></div>`;
      grid.appendChild(a);
    });
    section.appendChild(grid);
    content.appendChild(section);
  });

  if (shown === 0) {
    content.innerHTML = `<div class="grid"><div class="empty">"${filter}" — 일치하는 자료가 없습니다.</div></div>`;
  }
}

searchInput.addEventListener('input', e => render(e.target.value));
render();

/* 헤더 시계 */
function tick() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent = `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
tick(); setInterval(tick, 1000);
</script>
</body>
</html>
